kind: Cluster
name: kind-cluster
apiVersion: kind.x-k8s.io/v1alpha4
containerdConfigPatches:
- |-
  [plugins."io.containerd.grpc.v1.nm".registry.configs."localhost:5001".tls]
    insecure_skip_verify = true
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30000
    hostPort: 2746
    protocol: TCP