apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: steps-storage-sensitive-
spec:
  serviceAccountName: argo-executor
  entrypoint: steps-storage-sensitive

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  templates:
    - name: steps-storage-sensitive
      steps:
        - - name: task-0
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "0"

        - - name: task-1
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "1"

        - - name: task-2
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "2"

        - - name: task-3
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "3"

        - - name: task-4
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "4"

        - - name: task-5
            template: storage-task
            arguments:
              parameters:
                - name: task-id
                  value: "5"

        - - name: export-results-to-s3
            template: export-to-s3
            arguments:
              parameters:
                - name: path
                  value: /mnt/work/storage-results
                - name: prefix
                  value: "runs/{{workflow.name}}/storage-sensitive-results"

    - name: storage-task
      inputs:
        parameters:
          - name: task-id
      container:
        image: argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/storage_sensitive_task.py
          - --task-id
          - "{{inputs.parameters.task-id}}"
          - --lock-file
          - /mnt/work/shared.lock
          - --output-dir
          - /mnt/work/storage-results
          - --work-seconds
          - "4"
          - --max-wait-seconds
          - "3"
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work

    - name: export-to-s3
      inputs:
        parameters:
          - name: path
          - name: prefix
      container:
        image: argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/export_to_s3.py
          - --path
          - "{{inputs.parameters.path}}"
          - --bucket
          - argo-workflows-lsc
          - --prefix
          - "{{inputs.parameters.prefix}}"
        envFrom:
          - secretRef:
              name: aws-s3-credentials
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work
