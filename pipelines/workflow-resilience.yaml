apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ml-resilience-pipeline-
spec:
  entrypoint: resilience-pipeline
  serviceAccountName: argo-executor
  
  # Defining the Global Exit Handler
  onExit: pipeline-cleanup-handler

  templates:
    - name: resilience-pipeline
      dag:
        tasks:
          - name: generate-data
            template: generate-data
          - name: train-model
            dependencies: [generate-data]
            template: flaky-training

    - name: generate-data
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/generate_data.py
          - --output
          - /mnt/work/raw.csv
          - --rows
          - "5000"
          - --features
          - "10"
          - --metrics-dir
          - /mnt/work/metrics

    # Retry Strategy with Exponential Backoff
    - name: flaky-training
      retryStrategy:
        limit: "3"              # Retry up to 3 times before failing the step
        retryPolicy: "Always"   # Retry on any type of container failure
        backoff:
          duration: "4s"        # Initial wait time of 4 seconds after the first failure
          factor: 2             # Double the wait time on each subsequent failure (4s, 8s, 16s)
          maxDuration: "30s"    # Cap the maximum backoff delay
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        # Python snippet injected via CLI invocation to simulate a flaky training workload
        args:
          - "-c"
          - |
            import random, sys, time
            print("Starting ML Model Training sequence...")
            time.sleep(2)
            # Simulate a 50% chance of failure
            if random.choice([True, False]):
                print("CRITICAL ERROR: Simulated transient network failure when fetching model weights.")
                sys.exit(1)
            print("SUCCESS: Model training completed with 0.94 accuracy.")

    # Exit Handler Template
    - name: pipeline-cleanup-handler
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - "-c"
          - |
            import sys
            # Argo automatically populates global workflow parameters at runtime
            workflow_status = "{{workflow.status}}"
            print(f"Global Exit Handler invoked.")
            print(f"Final Pipeline State: {workflow_status}")
            print("Scrubbing local task caches and finalizing benchmark logs...")