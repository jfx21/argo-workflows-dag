apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ml-pipeline-steps-
spec:
  serviceAccountName: argo-executor
  entrypoint: steps-pipeline
  arguments:
    parameters:
      - name: rows
        value: "30000"
      - name: features
        value: "20"
      - name: parts
        value: "3"

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

  templates:
    - name: steps-pipeline
      steps:
        - - name: generate-data
            template: generate-data

        - - name: split-data
            template: split-data

        - - name: preprocess-part-0
            template: preprocess
            arguments:
              parameters:
                - name: part-id
                  value: "0"

        - - name: preprocess-part-1
            template: preprocess
            arguments:
              parameters:
                - name: part-id
                  value: "1"

        - - name: preprocess-part-2
            template: preprocess
            arguments:
              parameters:
                - name: part-id
                  value: "2"

        - - name: merge-data
            template: merge-data

        - - name: train-model
            template: train-model

        - - name: evaluate-model
            template: evaluate-model

        - - name: collect-metrics
            template: collect-metrics

    - name: generate-data
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/generate_data.py
          - --output
          - /mnt/work/raw.csv
          - --rows
          - "{{workflow.parameters.rows}}"
          - --features
          - "{{workflow.parameters.features}}"
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work

    - name: split-data
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/split_data.py
          - --input
          - /mnt/work/raw.csv
          - --output-dir
          - /mnt/work/parts
          - --parts
          - "{{workflow.parameters.parts}}"
          - --parts-json
          - /mnt/work/parts.json
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work

    - name: preprocess
      inputs:
        parameters:
          - name: part-id
      retryStrategy:
        limit: 3
        retryPolicy: "OnFailure"
        backoff:
          duration: "5s"
          factor: 2
          maxDuration: "30s"
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/preprocess.py
          - --parts-dir
          - /mnt/work/parts
          - --part-id
          - "{{inputs.parameters.part-id}}"
          - --output-dir
          - /mnt/work/processed
          - --sleep
          - "10"
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work

    - name: merge-data
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/merge_data.py
          - --input-dir
          - /mnt/work/processed
          - --output
          - /mnt/work/merged.csv
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work
      outputs:
        artifacts:
          - name: merged-data
            path: /mnt/work/merged.csv

    - name: train-model
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/train_model.py
          - --input
          - /mnt/work/merged.csv
          - --model-output
          - /mnt/work/model.pkl
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work
      outputs:
        artifacts:
          - name: model
            path: /mnt/work/model.pkl

    - name: evaluate-model
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/evaluate_model.py
          - --input
          - /mnt/work/merged.csv
          - --model
          - /mnt/work/model.pkl
          - --metrics-output
          - /mnt/work/evaluation-metrics.json
          - --metrics-dir
          - /mnt/work/metrics
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work
      outputs:
        artifacts:
          - name: evaluation-metrics
            path: /mnt/work/evaluation-metrics.json

    - name: collect-metrics
      container:
        image: localhost/argo-ml:local
        imagePullPolicy: Never
        command: ["python"]
        args:
          - src/collect_metrics.py
          - --metrics-dir
          - /mnt/work/metrics
          - --output
          - /mnt/work/benchmark-summary.json
          - --workflow-type
          - steps
          - --rows
          - "{{workflow.parameters.rows}}"
          - --features
          - "{{workflow.parameters.features}}"
          - --parts
          - "{{workflow.parameters.parts}}"
        volumeMounts:
          - name: workdir
            mountPath: /mnt/work
      outputs:
        artifacts:
          - name: benchmark-summary
            path: /mnt/work/benchmark-summary.json